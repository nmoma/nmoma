agent:
  local_mode: false
  replan_interval: 1.0
  planning_horizon: 6.0
  stat_mode: false
  stat_num: 1000
  stat_number: 1
  only_front: false
  stat_file: "/log/train/"

grid_map:
  # real case:
  # map_size_x: 12.0
  # map_size_y: 8.0
  # sim case:
  map_size_x: 10.0
  map_size_y: 10.0
  map_size_z: 1.6
  resolution: 0.1
map:
  float_height_range:
  - 0.4
  - 0.8
  float_size_range:
  - 0.3
  - 0.6
  min_obs_dis: 1.0
  obs_num:
  - 20
  - 0
  resolution: 0.05
  size_x: 10.0
  size_y: 10.0
  wall_height_range:
  - 0.4
  - 1.5
  wall_size_range:
  - 0.1
  - 0.8