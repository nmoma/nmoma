save_model_seperately: false
exp_dir: "logs"
tb_dir: "logs/tb"
ckpt_dir: "logs/ckpt_edm"
save_scene_model: true
wandb: true
diffuser:
  load_pretrained: true
  pretrained_path: "logs/ckpt_edm/model.pth"
  steps: 18 # for inference only, default 18
  sigma_min: 0.002 # for inference only, default 0.002
  sigma_max: 80 # for inference only, default 80
  sigma_data: 0.5 # default 0.5
  P_mean: -1.2 # default -1.2
  P_std: 1.2 # default 1.2
  # rec, safe, smooth, uniarc, classify
  loss_epoch: [0, 100, 100, 100, 100]
  loss_weight: [1.0, 50.0, 0.1, 20.0, 1.0]
train:
  dataset: "data_valid_raw.h5"
  num_epochs: 100
  batch_size: 64
  num_workers: 8
  log_step: 100
  lr: 1.0e-4
valid:
  dataset: "data_valid_raw.h5"
d_x: 11
d_model: 512
d_startgoal: 64
time_embed_mult: 2
nblocks: 4 # 4 or 8
resblock_dropout: 0.1
transformer_num_heads: 8
transformer_dim_head: 64
transformer_dropout: 0.1
transformer_depth: 4 # 2 or 4
transformer_mult_ff: 4
data_normer: "shoot" # "shoot" or "simple"
use_position_embedding: true # for input x
scene_model:
  simple: true
  add_spacer: true
  num_points: 4096
